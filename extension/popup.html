<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobShield AI</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        width: 320px;
        font-family: "Segoe UI", sans-serif;
        background: #f4f6fb;
        color: #1d2939;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e4e7ec;
        border-radius: 10px;
        padding: 12px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      p {
        margin: 0 0 10px;
        color: #475467;
        font-size: 12px;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        background: #0b63f6;
        color: #ffffff;
        cursor: pointer;
      }

      button:disabled {
        background: #98a2b3;
        cursor: not-allowed;
      }

      #result {
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>JobShield AI</h1>
      <p>Analyze this job page instantly.</p>
      <button id="analyzeBtn">Analyze This Job</button>
      <div id="result">Click the button to scan this page.</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
